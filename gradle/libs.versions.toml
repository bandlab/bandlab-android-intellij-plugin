[versions]
# libraries
junit = "4.13.2"
# Google Truth - https://github.com/google/truth/releases
truth = "1.4.5"

# plugins
changelog = "2.5.0"
compose = "1.10.2"
intellij-platform = "2.12.0"
kotlin = "2.3.10"
kover = "0.9.7"
plugin-uploader = "1.3.5"

[libraries]
junit = { group = "junit", name = "junit", version.ref = "junit" }
truth = { group = "com.google.truth", name = "truth", version.ref = "truth" }

[plugins]
changelog = { id = "org.jetbrains.changelog", version.ref = "changelog" }
compose = { id = "org.jetbrains.compose", version.ref = "compose" }
compose-compiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
intellij-platform = { id = "org.jetbrains.intellij.platform", version.ref = "intellij-platform" }
kotlin = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kover = { id = "org.jetbrains.kotlinx.kover", version.ref = "kover" }
plugin-uploader = { id = "dev.bmac.intellij.plugin-uploader", version.ref = "plugin-uploader" }